<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="theme-color" content="#0093E9" />
    <title>通知车主挪车</title>
    <style>
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sar: env(safe-area-inset-right, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        margin: 0;
        padding: 0;
      }
      html {
        font-size: 16px;
        -webkit-text-size-adjust: 100%;
      }
      html,
      body {
        height: 100%;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI",
          Roboto, sans-serif;
        background: linear-gradient(160deg, #0093e9 0%, #80d0c7 100%);
        min-height: 100vh;
        min-height: -webkit-fill-available;
        padding: clamp(16px, 4vw, 24px);
        padding-top: calc(clamp(16px, 4vw, 24px) + var(--sat));
        padding-bottom: calc(clamp(16px, 4vw, 24px) + var(--sab));
        padding-left: calc(clamp(16px, 4vw, 24px) + var(--sal));
        padding-right: calc(clamp(16px, 4vw, 24px) + var(--sar));
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: url("data:image/svg+xml,%3Csvg width='52' height='26' viewBox='0 0 52 26' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.1'%3E%3Cpath d='M10 10c0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6h2c0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4 3.314 0 6 2.686 6 6 0 2.21 1.79 4 4 4v2c-3.314 0-6-2.686-6-6 0-2.21-1.79-4-4-4-3.314 0-6-2.686-6-6zm25.464-1.95l8.486 8.486-1.414 1.414-8.486-8.486 1.414-1.414z' /%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        z-index: -1;
      }
      .container {
        width: 100%;
        max-width: 500px;
        display: flex;
        flex-direction: column;
        gap: clamp(12px, 3vw, 20px);
      }
      .card {
        background: rgba(255, 255, 255, 0.95);
        border-radius: clamp(20px, 5vw, 28px);
        padding: clamp(18px, 4vw, 28px);
        box-shadow: 0 10px 40px rgba(0, 147, 233, 0.2);
        transition: transform 0.2s ease;
      }
      @media (hover: hover) {
        .card:hover {
          transform: translateY(-2px);
        }
      }
      .card:active {
        transform: scale(0.98);
      }
      .header {
        text-align: center;
        padding: clamp(20px, 5vw, 32px) clamp(16px, 4vw, 28px);
        background: white;
      }
      .icon-wrap {
        width: clamp(72px, 18vw, 100px);
        height: clamp(72px, 18vw, 100px);
        background: linear-gradient(135deg, #0093e9 0%, #80d0c7 100%);
        border-radius: clamp(22px, 5vw, 32px);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto clamp(14px, 3vw, 24px);
        box-shadow: 0 12px 32px rgba(0, 147, 233, 0.35);
      }
      .icon-wrap span {
        font-size: clamp(36px, 9vw, 52px);
        line-height: 1;
        display: block;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .header h1 {
        font-size: clamp(22px, 5.5vw, 30px);
        font-weight: 700;
        color: #1a202c;
        margin-bottom: 6px;
      }
      .header p {
        font-size: clamp(13px, 3.5vw, 16px);
        color: #718096;
        font-weight: 500;
      }
      .input-card {
        padding: 0;
        overflow: hidden;
      }
      .input-card .msg-input {
        width: 100%;
        min-height: clamp(90px, 20vw, 120px);
        border: none;
        padding: clamp(16px, 4vw, 24px);
        font-size: clamp(15px, 4vw, 18px);
        font-family: inherit;
        outline: none;
        color: #2d3748;
        background: transparent;
        line-height: 1.5;
        cursor: text;
      }
      .input-card .msg-input:empty::before {
        content: attr(data-placeholder);
        color: #a0aec0;
        pointer-events: none;
      }
      .tags {
        display: flex;
        justify-content: center;
        gap: clamp(8px, 3vw, 16px);
        padding: 0 clamp(12px, 3vw, 20px) clamp(14px, 3vw, 20px);
        flex-wrap: wrap;
      }
      .tag {
        background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
        color: #00796b;
        padding: clamp(8px, 2vw, 12px) clamp(12px, 3vw, 18px);
        border-radius: 20px;
        font-size: clamp(13px, 3.5vw, 15px);
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        transition: all 0.2s;
        border: 1px solid #80cbc4;
        min-height: 44px;
        display: flex;
        align-items: center;
      }
      .tag:active {
        transform: scale(0.95);
        background: #80cbc4;
      }
      /* 标签选中高亮状态 */
      .tag.active {
        background: linear-gradient(135deg, #b2dfdb 0%, #80cbc4 100%);
        border-color: #00897b;
        color: #00695c;
      }
      .loc-card {
        display: flex;
        align-items: center;
        gap: clamp(10px, 3vw, 16px);
        padding: clamp(14px, 3.5vw, 22px) clamp(16px, 4vw, 24px);
        cursor: pointer;
        min-height: 64px;
      }
      .loc-icon {
        width: clamp(44px, 11vw, 56px);
        height: clamp(44px, 11vw, 56px);
        border-radius: clamp(14px, 3.5vw, 18px);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(22px, 5.5vw, 28px);
        transition: all 0.3s;
        flex-shrink: 0;
      }
      .loc-icon.loading {
        background: #fff3cd;
      }
      .loc-icon.success {
        background: #d4edda;
      }
      .loc-icon.error {
        background: #f8d7da;
      }
      .loc-content {
        flex: 1;
        min-width: 0;
      }
      .loc-title {
        font-size: clamp(15px, 4vw, 18px);
        font-weight: 600;
        color: #2d3748;
      }
      .loc-status {
        font-size: clamp(12px, 3.2vw, 14px);
        color: #718096;
        margin-top: 3px;
      }
      .loc-status.success {
        color: #28a745;
      }
      .loc-status.error {
        color: #dc3545;
      }
      .btn-main {
        background: linear-gradient(135deg, #0093e9 0%, #80d0c7 100%);
        color: white;
        border: none;
        padding: clamp(16px, 4vw, 22px);
        border-radius: clamp(16px, 4vw, 22px);
        font-size: clamp(16px, 4.2vw, 20px);
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        box-shadow: 0 10px 30px rgba(0, 147, 233, 0.35);
        transition: all 0.2s;
        min-height: 56px;
      }
      .btn-main:active {
        transform: scale(0.98);
      }
      .btn-main:disabled {
        background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
        box-shadow: none;
        cursor: not-allowed;
      }
      .toast {
        position: fixed;
        top: calc(20px + var(--sat));
        left: 50%;
        transform: translateX(-50%) translateY(-100px);
        background: white;
        padding: clamp(12px, 3vw, 16px) clamp(20px, 5vw, 32px);
        border-radius: 16px;
        font-size: clamp(14px, 3.5vw, 16px);
        font-weight: 600;
        color: #2d3748;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 100;
        max-width: calc(100vw - 40px);
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      #successView {
        display: none;
      }
      .success-card {
        text-align: center;
        background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
        border: 2px solid #28a745;
      }
      .success-icon {
        font-size: clamp(56px, 14vw, 80px);
        margin-bottom: clamp(12px, 3vw, 20px);
        display: block;
      }
      .success-card h2 {
        color: #155724;
        margin-bottom: 8px;
        font-size: clamp(20px, 5vw, 28px);
      }
      .success-card p {
        color: #1e7e34;
        font-size: clamp(14px, 3.5vw, 16px);
      }
      .owner-card {
        background: white;
        border: 2px solid #80d0c7;
        text-align: center;
      }
      .owner-card.hidden {
        display: none;
      }
      .owner-card h3 {
        color: #0093e9;
        margin-bottom: 8px;
        font-size: clamp(18px, 4.5vw, 22px);
      }
      .owner-card p {
        color: #718096;
        margin-bottom: 16px;
        font-size: clamp(14px, 3.5vw, 16px);
      }
      .owner-card .map-links {
        display: flex;
        gap: clamp(8px, 2vw, 14px);
        flex-wrap: wrap;
      }
      .owner-card .map-btn {
        flex: 1;
        min-width: 120px;
        padding: clamp(12px, 3vw, 16px);
        border-radius: clamp(12px, 3vw, 16px);
        text-decoration: none;
        font-weight: 600;
        font-size: clamp(13px, 3.5vw, 15px);
        text-align: center;
        min-height: 48px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .map-btn.amap {
        background: #1890ff;
        color: white;
      }
      .map-btn.apple {
        background: #1d1d1f;
        color: white;
      }
      .action-card {
        display: flex;
        flex-direction: column;
        gap: clamp(10px, 2.5vw, 14px);
      }
      .action-hint {
        text-align: center;
        font-size: clamp(13px, 3.5vw, 15px);
        color: #718096;
        margin-bottom: 4px;
      }
      .btn-retry,
      .btn-phone {
        color: white;
        border: none;
        padding: clamp(14px, 3.5vw, 18px);
        border-radius: clamp(14px, 3.5vw, 18px);
        font-size: clamp(15px, 4vw, 17px);
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.2s;
        min-height: 52px;
        text-decoration: none;
      }
      .btn-retry {
        background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        box-shadow: 0 8px 24px rgba(245, 158, 11, 0.3);
      }
      .btn-retry:active {
        transform: scale(0.98);
      }
      .btn-retry:disabled {
        background: linear-gradient(135deg, #9ca3af 0%, #6b7280 100%);
        box-shadow: none;
        cursor: not-allowed;
      }
      .btn-phone {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        box-shadow: 0 8px 24px rgba(239, 68, 68, 0.3);
      }
      .btn-phone:active {
        transform: scale(0.98);
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      .loading-text {
        animation: pulse 1.5s ease-in-out infinite;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 20px;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s;
      }
      .modal-overlay.show {
        opacity: 1;
        visibility: visible;
      }
      .modal-box {
        background: white;
        border-radius: 20px;
        padding: clamp(24px, 6vw, 32px);
        max-width: 340px;
        width: 100%;
        text-align: center;
        transform: scale(0.9);
        transition: transform 0.3s;
      }
      .modal-overlay.show .modal-box {
        transform: scale(1);
      }
      .modal-icon {
        font-size: 48px;
        margin-bottom: 16px;
      }
      .modal-title {
        font-size: 18px;
        font-weight: 700;
        color: #1a202c;
        margin-bottom: 8px;
      }
      .modal-desc {
        font-size: 14px;
        color: #718096;
        margin-bottom: 24px;
        line-height: 1.5;
      }
      .modal-buttons {
        display: flex;
        gap: 12px;
      }
      .modal-btn {
        flex: 1;
        padding: 14px 16px;
        border-radius: 12px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
      }
      .modal-btn:active {
        transform: scale(0.96);
      }
      .modal-btn-primary {
        background: linear-gradient(135deg, #0093e9 0%, #80d0c7 100%);
        color: white;
      }
      .modal-btn-secondary {
        background: #f1f5f9;
        color: #64748b;
      }
      @media (min-width: 768px) {
        body {
          align-items: center;
        }
        .container {
          max-width: 480px;
        }
      }
      @media (min-width: 1024px) {
        .container {
          max-width: 520px;
        }
        .card {
          padding: 32px;
        }
      }
      @media (min-width: 600px) and (max-width: 900px) {
        .container {
          max-width: 460px;
        }
      }
      @media (orientation: landscape) and (max-height: 500px) {
        body {
          align-items: flex-start;
          padding-top: calc(12px + var(--sat));
        }
        .header {
          padding: 16px;
        }
        .icon-wrap {
          width: 60px;
          height: 60px;
          margin-bottom: 12px;
        }
        .icon-wrap span {
          font-size: 32px;
          line-height: 1;
          display: flex;
          align-items: center;
          justify-content: center;
          width: 100%;
          height: 100%;
        }
        .success-icon {
          font-size: 48px;
          margin-bottom: 10px;
        }
      }
      @media (max-width: 350px) {
        .container {
          gap: 10px;
        }
        .card {
          padding: 14px;
          border-radius: 18px;
        }
        .tags {
          gap: 6px;
        }
        .tag {
          padding: 8px 10px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="toast" class="toast"></div>

    <!-- 位置授权提示弹窗：页面加载后自动弹出 -->
    <div id="locationTipModal" class="modal-overlay">
      <div class="modal-box">
        <div class="modal-icon">📍</div>
        <div class="modal-title">位置信息说明</div>
        <div class="modal-desc">
          分享位置可让车主确认您在车旁<br />不分享将延迟5分钟发送通知
        </div>
        <div class="modal-buttons">
          <button
            class="modal-btn modal-btn-primary"
            onclick="
              hideModal('locationTipModal');
              requestLocation();
            "
          >
            我知道了
          </button>
        </div>
      </div>
    </div>

    <div class="container" id="mainView">
      <div class="card header">
        <div class="icon-wrap"><span>🚗</span></div>
        <h1>通知车主挪车</h1>
        <p>Notify Car Owner</p>
      </div>

      <div class="card input-card">
        <!-- contenteditable 输入框：支持富文本（加急红色文字）-->
        <div
          id="msgInput"
          class="msg-input"
          contenteditable="true"
          data-placeholder="输入留言给车主...（或点击下方按钮）"
        ></div>

        <div class="tags">
          <!-- [修改] 恢复 id 属性，供 updateTagActive() 控制高亮；挡路/临停互斥 -->
          <div
            id="tag-block"
            class="tag"
            onclick="selectBase('您的车挡住我了')"
          >
            🚧 挡路
          </div>
          <div id="tag-temp" class="tag" onclick="selectBase('临时停靠一下')">
            ⏱️ 临停
          </div>
          <div id="tag-urgent" class="tag" onclick="toggleUrgent()">
            🙏 加急
          </div>
        </div>
      </div>

      <div class="card loc-card">
        <div id="locIcon" class="loc-icon loading">📍</div>
        <div class="loc-content">
          <div class="loc-title">我的位置</div>
          <div id="locStatus" class="loc-status">等待获取...</div>
        </div>
      </div>

      <button id="notifyBtn" class="card btn-main" onclick="sendNotify()">
        <span>🔔</span>
        <span>一键通知车主</span>
      </button>
    </div>

    <script>
      let userLocation = null;
      let checkTimer = null;

      // ── 页面初始化 ──────────────────────────────────────────────────────────

      window.onload = () => {
        showModal("locationTipModal");
      };

      function showModal(id) {
        document.getElementById(id).classList.add("show");
      }
      function hideModal(id) {
        document.getElementById(id).classList.remove("show");
      }

      // ── 位置获取 ────────────────────────────────────────────────────────────

      function requestLocation() {
        const icon = document.getElementById("locIcon");
        const txt = document.getElementById("locStatus");
        icon.className = "loc-icon loading";
        txt.className = "loc-status";
        txt.innerText = "正在获取定位...";

        if ("geolocation" in navigator) {
          navigator.geolocation.getCurrentPosition(
            (pos) => {
              userLocation = {
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
              };
              icon.className = "loc-icon success";
              txt.className = "loc-status success";
              txt.innerText = "已获取位置 ✓";
            },
            () => {
              icon.className = "loc-icon error";
              txt.className = "loc-status error";
              txt.innerText =
                "位置获取失败，刷新页面重试或复制链接到浏览器打开";
            },
            { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 },
          );
        } else {
          icon.className = "loc-icon error";
          txt.className = "loc-status error";
          txt.innerText = "浏览器不支持定位";
        }
      }

      // ── 标签状态管理 ────────────────────────────────────────────────────────
      // [修改] 以下为重写的标签逻辑，解决四个问题：
      //   1. 挡路 / 临停 互斥（切换时自动移除另一个）
      //   2. 再次点击同一标签可取消
      //   3. 加急防重复插入（再次点击为取消）
      //   4. 恢复标签选中高亮反馈

      let selectedBaseText = ""; // 当前选中的基础标签文本，'' 表示未选
      let urgentInserted = false; // 加急是否已插入

      // 选择/取消 挡路 or 临停（二选一，互斥）
      function selectBase(text) {
        const el = document.getElementById("msgInput");

        if (selectedBaseText === text) {
          // 再次点击：取消，从编辑框移除该文本
          removeBaseText(el, text);
          selectedBaseText = "";
        } else {
          if (selectedBaseText) {
            // 已选另一个：先替换掉旧文本，再更新为新文本
            replaceBaseText(el, selectedBaseText, text);
          } else {
            // 尚未选任何基础标签：在光标处插入
            insertAtCursor(el, text);
          }
          selectedBaseText = text;
        }
        updateTagActive();
      }

      // 插入 / 取消 加急（toggle，始终追加到末尾，红色加粗）
      function toggleUrgent() {
        const el = document.getElementById("msgInput");
        const existing = el.querySelector("span[data-urgent]");

        if (existing) {
          // 已存在：移除
          existing.remove();
          urgentInserted = false;
        } else {
          // 不存在：追加到末尾
          const currentText = el.innerText.trim();
          const u = document.createElement("span");
          u.dataset.urgent = "1"; // 标记用于后续查找
          u.style.color = "#e53e3e";
          u.style.fontWeight = "700";
          u.textContent =
            (currentText && !currentText.endsWith("，") ? "，" : "") +
            "麻烦尽快";
          el.appendChild(u);
          moveCursorToEnd(el);
          urgentInserted = true;
        }
        updateTagActive();
      }

      function insertAtCursor(el, text) {
        el.focus();
        const sel = window.getSelection();
        const urgentEl = el.querySelector("span[data-urgent]");

        // 光标存在 且 不在加急 span 内部时，才在光标处插入
        if (
          sel &&
          sel.rangeCount > 0 &&
          el.contains(sel.anchorNode) &&
          !(urgentEl && urgentEl.contains(sel.anchorNode))
        ) {
          const range = sel.getRangeAt(0);
          range.deleteContents();
          const node = document.createTextNode(text);
          range.insertNode(node);
          range.setStartAfter(node);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
        } else {
          // 光标在加急 span 内或不存在时，统一插到加急 span 之前
          el.insertBefore(document.createTextNode(text), urgentEl || null);
        }
      }

      // 从编辑框中移除指定的基础文本（跳过加急 span 内部的文本节点）
      function removeBaseText(el, text) {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
          const n = walker.currentNode;
          if (
            n.parentNode &&
            n.parentNode.dataset &&
            n.parentNode.dataset.urgent
          )
            continue;
          if (n.textContent.includes(text)) {
            n.textContent = n.textContent.replace(text, "");
            break;
          }
        }
      }

      // 将编辑框中的旧基础文本替换为新文本（找不到则直接插入光标处）
      function replaceBaseText(el, oldText, newText) {
        const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
        while (walker.nextNode()) {
          const n = walker.currentNode;
          if (
            n.parentNode &&
            n.parentNode.dataset &&
            n.parentNode.dataset.urgent
          )
            continue;
          if (n.textContent.includes(oldText)) {
            n.textContent = n.textContent.replace(oldText, newText);
            return;
          }
        }
        // 旧文本已被手动删除，直接在光标处插入新文本
        insertAtCursor(el, newText);
      }

      // 同步三个标签的选中高亮状态
      function updateTagActive() {
        document
          .getElementById("tag-block")
          .classList.toggle("active", selectedBaseText === "您的车挡住我了");
        document
          .getElementById("tag-temp")
          .classList.toggle("active", selectedBaseText === "临时停靠一下");
        document
          .getElementById("tag-urgent")
          .classList.toggle("active", urgentInserted);
      }

      // 将光标移至编辑框末尾
      function moveCursorToEnd(el) {
        el.focus();
        const range = document.createRange();
        range.selectNodeContents(el);
        range.collapse(false); // false = 折叠到末尾
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }

      // ── 发送通知 ────────────────────────────────────────────────────────────

      async function sendNotify() {
        const btn = document.getElementById("notifyBtn");
        const msg = document.getElementById("msgInput").innerText.trim();
        const delayed = !userLocation; // 无位置则延迟 5 分钟

        btn.disabled = true;
        btn.innerHTML = "<span>🚀</span><span>发送中...</span>";

        try {
          const res = await fetch("/api/notify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: msg,
              location: userLocation,
              delayed,
            }),
          });

          if (res.ok) {
            showToast(delayed ? "⏳ 通知将延迟 5 分钟发送" : "✅ 发送成功！");
            document.getElementById("mainView").style.display = "none";
            document.getElementById("successView").style.display = "flex";
            startPolling();
          } else {
            throw new Error("API Error");
          }
        } catch (e) {
          showToast("❌ 发送失败，请重试");
          btn.disabled = false;
          btn.innerHTML = "<span>🔔</span><span>一键通知车主</span>";
        }
      }

      // ── 工具函数 ────────────────────────────────────────────────────────────

      function showToast(text) {
        const t = document.getElementById("toast");
        t.innerText = text;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 3000);
      }
    </script>
  </body>
</html>
